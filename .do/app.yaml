# DigitalOcean App Platform — doc-platform (API + Web)
# Deploys on push to the branch set below. Replace YOUR_GITHUB_ORG/doc-platform with your repo.
# See docs/DEPLOYMENT.md for env vars and manual steps.

name: doc-platform
region: nyc

services:
  # Backend API (Express, Prisma). Runs migrations on each deploy before start.
  - name: api
    source_dir: apps/api
    github:
      repo: YOUR_GITHUB_ORG/doc-platform
      branch: main
      deploy_on_push: true
    environment_slug: node-js
    build_command: pnpm install && pnpm run build
    run_command: pnpm prisma migrate deploy && pnpm start
    http_port: 8080
    instance_count: 1
    envs:
      - key: NODE_ENV
        value: production
        type: GENERAL
        scope: RUN_AND_BUILD_TIME
      # Set in DO dashboard (App → api → Settings → App-Level Environment Variables):
      # - DATABASE_URL (SECRET) — required
      # - SESSION_SECRET or JWT_SECRET or API_SECRET (SECRET) — required in production
      # - DOC_WEB_BASE_URL — optional; set to your web app URL for invite links
      # - S3_*, REDIS_URL, OPENAI_API_KEY, etc. — see docs/DEPLOYMENT.md

  # Frontend (Next.js). NEXT_PUBLIC_API_URL must be set at build time to the live API URL.
  - name: web
    source_dir: apps/web
    github:
      repo: YOUR_GITHUB_ORG/doc-platform
      branch: main
      deploy_on_push: true
    environment_slug: node-js
    build_command: pnpm install && pnpm run build
    run_command: pnpm start
    http_port: 8080
    instance_count: 1
    envs:
      - key: NODE_ENV
        value: production
        type: GENERAL
        scope: RUN_AND_BUILD_TIME
      # Set in DO dashboard (App → web → Settings → App-Level Environment Variables):
      # - NEXT_PUBLIC_API_URL — REQUIRED at BUILD time. Set to API public URL (e.g. https://api-xxxx.ondigitalocean.app)
      #   Enable "Available at build" so the Next.js build bakes it into the client.
