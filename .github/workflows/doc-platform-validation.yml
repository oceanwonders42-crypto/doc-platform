name: Doc Platform Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: API typecheck
        run: pnpm --dir apps/api exec tsc -p tsconfig.json

      - name: Web typecheck
        run: pnpm --dir apps/web exec tsc --noEmit

      - name: Web production build
        run: pnpm --dir apps/web build
