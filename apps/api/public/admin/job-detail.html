<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Job detail</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; padding: 1rem; background: #f5f5f5; }
    a { color: #0066cc; }
    h1 { margin: 0 0 0.5rem; font-size: 1.25rem; }
    h2 { margin: 1rem 0 0.5rem; font-size: 1rem; color: #444; }
    .back { margin-bottom: 1rem; }
    .api-key-wrap { margin-bottom: 1rem; }
    .api-key-wrap input { width: 24rem; padding: 0.5rem; }
    .btn { padding: 0.35rem 0.75rem; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; background: #fff; margin-right: 0.25rem; }
    .btn.primary { background: #0066cc; color: #fff; border-color: #0066cc; }
    .error { color: #c00; margin-bottom: 0.5rem; }
    .card { background: #fff; padding: 1rem; border-radius: 6px; margin-bottom: 1rem; }
    .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.8rem; }
    .badge.queued { background: #e2e3e5; }
    .badge.running { background: #cce5ff; }
    .badge.done { background: #d4edda; }
    .badge.failed { background: #f8d7da; }
    .badge.cancelled { background: #f5f5f5; }
    .meta-table { border-collapse: collapse; width: 100%; max-width: 40rem; }
    .meta-table th, .meta-table td { padding: 0.35rem 0.5rem; text-align: left; border-bottom: 1px solid #eee; }
    .meta-table th { width: 10rem; color: #666; font-weight: 500; }
    pre { background: #f5f5f5; padding: 0.75rem; border-radius: 4px; overflow: auto; font-size: 0.85rem; white-space: pre-wrap; word-break: break-all; }
    .events-list { list-style: none; padding: 0; margin: 0; }
    .events-list li { padding: 0.4rem 0; border-bottom: 1px solid #eee; font-size: 0.9rem; }
    .events-list .level { font-weight: 600; margin-right: 0.5rem; }
    .events-list .level.info { color: #0066cc; }
    .events-list .level.warn { color: #856404; }
    .events-list .level.error { color: #721c24; }
    .loading { color: #666; }
  </style>
</head>
<body>
  <div class="back"><a href="/admin/jobs" id="backLink">← Jobs</a></div>
  <h1 id="pageTitle">Job</h1>
  <div class="api-key-wrap">
    <label>API key (Bearer, platform admin):</label>
    <input type="password" id="apiKey" placeholder="Paste API key" />
    <button type="button" id="loadBtn" class="btn primary">Load</button>
  </div>
  <div id="error" class="error" aria-live="polite"></div>
  <div id="content" style="display:none;">
    <div class="card">
      <h2>Metadata</h2>
      <table class="meta-table" id="metaTable"></table>
      <p style="margin-top:0.5rem;">
        <button type="button" id="retryBtn" class="btn primary" style="display:none;">Retry</button>
        <button type="button" id="cancelBtn" class="btn" style="display:none;">Cancel</button>
      </p>
    </div>
    <div class="card">
      <h2>Payload</h2>
      <pre id="payloadPre"></pre>
    </div>
    <div class="card" id="resultMetaCard" style="display:none;">
      <h2>Result</h2>
      <pre id="resultMetaPre"></pre>
    </div>
    <div class="card" id="lastErrorCard" style="display:none;">
      <h2>Last error</h2>
      <pre id="lastErrorPre"></pre>
    </div>
    <div class="card">
      <h2>Event log</h2>
      <ul class="events-list" id="eventsList"></ul>
    </div>
  </div>

  <script>
    (function () {
      var API_BASE = '';
      var keyInput = document.getElementById('apiKey');
      var loadBtn = document.getElementById('loadBtn');
      var errorEl = document.getElementById('error');
      var contentEl = document.getElementById('content');
      var pageTitleEl = document.getElementById('pageTitle');
      var metaTable = document.getElementById('metaTable');
      var payloadPre = document.getElementById('payloadPre');
      var resultMetaCard = document.getElementById('resultMetaCard');
      var resultMetaPre = document.getElementById('resultMetaPre');
      var lastErrorCard = document.getElementById('lastErrorCard');
      var lastErrorPre = document.getElementById('lastErrorPre');
      var eventsList = document.getElementById('eventsList');
      var retryBtn = document.getElementById('retryBtn');
      var cancelBtn = document.getElementById('cancelBtn');

      function getJobId() {
        var path = (window.location.pathname || '').replace(/\/$/, '');
        var parts = path.split('/');
        var idx = parts.indexOf('jobs');
        if (idx >= 0 && parts[idx + 1]) return parts[idx + 1];
        return '';
      }
      function getAuth() {
        var key = (keyInput && keyInput.value) ? keyInput.value.trim() : '';
        return key ? { 'Authorization': 'Bearer ' + key } : {};
      }
      function setError(msg) { errorEl.textContent = msg || ''; }

      function loadJob() {
        var id = getJobId();
        if (!id) { setError('No job ID in URL'); return; }
        setError('');
        fetch(API_BASE + '/admin/jobs/' + encodeURIComponent(id), { headers: Object.assign({}, getAuth(), { Accept: 'application/json' }), credentials: 'include' })
          .then(function (r) {
            if (!r.ok) return r.json().then(function (d) { throw new Error(d.error || r.statusText); });
            return r.json();
          })
          .then(function (data) {
            var job = (data.ok && data.job) ? data.job : null;
            if (!job) { setError('Job not found'); return; }
            contentEl.style.display = 'block';
            pageTitleEl.textContent = 'Job ' + (job.type || job.id);

            var rows = [
              ['ID', job.id],
              ['Status', job.status],
              ['Type', job.type],
              ['Firm', (job.firm && job.firm.name) ? job.firm.name : (job.firmId || '—')],
              ['Attempts', (job.attempts ?? 0) + ' / ' + (job.maxAttempts ?? 5)],
              ['runAt', job.runAt ? new Date(job.runAt).toISOString() : '—'],
              ['lockedAt', job.lockedAt ? new Date(job.lockedAt).toISOString() : '—'],
              ['lockedBy', job.lockedBy || '—'],
              ['createdAt', job.createdAt ? new Date(job.createdAt).toISOString() : '—'],
              ['updatedAt', job.updatedAt ? new Date(job.updatedAt).toISOString() : '—'],
              ['finishedAt', job.finishedAt ? new Date(job.finishedAt).toISOString() : '—'],
            ];
            if (job.documentId) rows.push(['Document', '<a href="/documents/' + String(job.documentId).replace(/"/g, '&quot;') + '">' + String(job.documentId).replace(/</g, '&lt;') + '</a>']);
            if (job.caseId) rows.push(['Case', '<a href="/cases/' + String(job.caseId).replace(/"/g, '&quot;') + '">' + String(job.caseId).replace(/</g, '&lt;') + '</a>']);
            metaTable.innerHTML = rows.map(function (r) {
              return '<tr><th>' + r[0].replace(/</g, '&lt;') + '</th><td>' + (typeof r[1] === 'string' && r[1].indexOf('<a ') === 0 ? r[1] : String(r[1]).replace(/</g, '&lt;')) + '</td></tr>';
            }).join('');

            payloadPre.textContent = JSON.stringify(job.payload, null, 2) || '{}';

            if (job.resultMeta && Object.keys(job.resultMeta).length > 0) {
              resultMetaCard.style.display = 'block';
              resultMetaPre.textContent = JSON.stringify(job.resultMeta, null, 2);
            } else resultMetaCard.style.display = 'none';

            if (job.lastError) {
              lastErrorCard.style.display = 'block';
              lastErrorPre.textContent = job.lastError;
            } else lastErrorCard.style.display = 'none';

            var events = (job.events && job.events.length) ? job.events : [];
            eventsList.innerHTML = events.length ? events.map(function (e) {
              return '<li><span class="level ' + (e.level || 'info') + '">' + (e.level || 'info') + '</span> ' +
                (e.message || '').replace(/</g, '&lt;') +
                (e.meta ? ' <code>' + JSON.stringify(e.meta).replace(/</g, '&lt;') + '</code>' : '') +
                ' <span style="color:#888;">' + (e.createdAt ? new Date(e.createdAt).toLocaleString() : '') + '</span></li>';
            }).join('') : '<li class="loading">No events</li>';

            if (job.status === 'failed') {
              retryBtn.style.display = 'inline-block';
              cancelBtn.style.display = 'none';
            } else if (job.status === 'queued') {
              retryBtn.style.display = 'none';
              cancelBtn.style.display = 'inline-block';
            } else {
              retryBtn.style.display = 'none';
              cancelBtn.style.display = 'none';
            }
          })
          .catch(function (e) {
            setError(e.message);
          });
      }

      loadBtn.addEventListener('click', loadJob);
      retryBtn.addEventListener('click', function () {
        var id = getJobId();
        if (!id) return;
        retryBtn.disabled = true;
        fetch(API_BASE + '/admin/jobs/' + encodeURIComponent(id) + '/retry', { method: 'POST', headers: getAuth(), credentials: 'include' })
          .then(function (r) { return r.json().then(function (d) { if (!r.ok) throw new Error(d.error || r.statusText); return d; }); })
          .then(function () { loadJob(); })
          .catch(function (e) { setError(e.message); })
          .finally(function () { retryBtn.disabled = false; });
      });
      cancelBtn.addEventListener('click', function () {
        var id = getJobId();
        if (!id) return;
        cancelBtn.disabled = true;
        fetch(API_BASE + '/admin/jobs/' + encodeURIComponent(id) + '/cancel', { method: 'POST', headers: getAuth(), credentials: 'include' })
          .then(function (r) { return r.json().then(function (d) { if (!r.ok) throw new Error(d.error || r.statusText); return d; }); })
          .then(function () { loadJob(); })
          .catch(function (e) { setError(e.message); })
          .finally(function () { cancelBtn.disabled = false; });
      });

      if (getJobId() && keyInput && keyInput.value.trim()) loadBtn.click();
    })();
  </script>
</body>
</html>
