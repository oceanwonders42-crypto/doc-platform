<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Records Request</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; padding: 1rem; background: #f5f5f5; }
    a { color: #0066cc; }
    h1 { margin: 0 0 0.5rem; font-size: 1.25rem; }
    .back { margin-bottom: 1rem; }
    .api-key-wrap { margin-bottom: 1rem; }
    .api-key-wrap input { width: 20rem; padding: 0.5rem; }
    .api-key-wrap button { padding: 0.5rem 0.75rem; margin-left: 0.25rem; }
    .error { color: #c00; margin-bottom: 0.5rem; }
    .card { background: #fff; padding: 1rem; border-radius: 6px; margin-bottom: 1rem; }
    .card dl { margin: 0; }
    .card dt { font-weight: 600; margin-top: 0.5rem; }
    .card dd { margin: 0 0 0 1rem; }
    .loading { color: #666; }
    .btn { padding: 0.5rem 1rem; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; background: #fff; margin-right: 0.5rem; }
    .btn.primary { background: #0066cc; color: #fff; border-color: #0066cc; }
    .pdf-actions { margin-top: 1rem; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 10; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; padding: 1.5rem; border-radius: 8px; min-width: 320px; }
    .modal h2 { margin: 0 0 1rem; font-size: 1rem; }
    .modal label { display: block; margin-bottom: 0.25rem; }
    .modal select, .modal input { width: 100%; padding: 0.5rem; margin-bottom: 1rem; }
    .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }
    table { border-collapse: collapse; width: 100%; }
    th, td { padding: 0.5rem; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #fafafa; font-size: 0.9rem; }
    .ok-yes { color: #155724; }
    .ok-no { color: #721c24; }
  </style>
</head>
<body>
  <div class="back"><a href="#" id="backLink">← Back</a></div>
  <h1 id="pageTitle">Records Request</h1>
  <div class="api-key-wrap">
    <label>API key (Bearer):</label>
    <input type="password" id="apiKey" placeholder="Paste API key" />
    <button type="button" id="loadBtn">Load</button>
  </div>
  <div id="error" class="error" aria-live="polite"></div>
  <div id="content" style="display:none;">
    <div class="card" id="infoCard"></div>
    <div class="card pdf-actions">
      <h2 style="margin:0 0 0.5rem;">Generated PDF</h2>
      <p id="pdfStatus" class="loading">No PDF generated yet.</p>
      <a id="viewPdfLink" href="#" style="display:none;" target="_blank" rel="noopener">View PDF</a>
      <button type="button" id="regenerateBtn" class="btn primary">Regenerate PDF</button>
      <button type="button" id="sendBtn" class="btn primary" style="margin-left:0.25rem;">Send</button>
    </div>
    <div class="card">
      <h2 style="margin:0 0 0.5rem;">Delivery attempts</h2>
      <div id="attemptsList"><p class="loading">No attempts yet.</p></div>
    </div>
  </div>

  <div id="sendModal" class="modal-overlay" aria-hidden="true">
    <div class="modal">
      <h2>Send records request</h2>
      <label for="sendChannel">Channel</label>
      <select id="sendChannel">
        <option value="email">Email</option>
        <option value="fax">Fax</option>
      </select>
      <label for="sendDestination">Destination</label>
      <input type="text" id="sendDestination" placeholder="Email or fax number" />
      <div class="modal-actions">
        <button type="button" id="sendModalCancel" class="btn">Cancel</button>
        <button type="button" id="sendModalSubmit" class="btn primary">Send</button>
      </div>
    </div>
  </div>
  <div id="loadingState">
    <p class="loading">Enter API key and click Load.</p>
  </div>

  <script>
    (function () {
      const API_BASE = '';
      const keyInput = document.getElementById('apiKey');
      const loadBtn = document.getElementById('loadBtn');
      const errorEl = document.getElementById('error');
      const contentEl = document.getElementById('content');
      const loadingState = document.getElementById('loadingState');
      const pageTitleEl = document.getElementById('pageTitle');
      const infoCardEl = document.getElementById('infoCard');
      const pdfStatusEl = document.getElementById('pdfStatus');
      const viewPdfLink = document.getElementById('viewPdfLink');
      const regenerateBtn = document.getElementById('regenerateBtn');
      const backLink = document.getElementById('backLink');
      const sendBtn = document.getElementById('sendBtn');
      const sendModal = document.getElementById('sendModal');
      const sendChannel = document.getElementById('sendChannel');
      const sendDestination = document.getElementById('sendDestination');
      const sendModalCancel = document.getElementById('sendModalCancel');
      const sendModalSubmit = document.getElementById('sendModalSubmit');
      const attemptsListEl = document.getElementById('attemptsList');

      function getRequestId() {
        var path = (window.location.pathname || '').replace(/\/$/, '');
        var parts = path.split('/');
        var idx = parts.indexOf('records-requests');
        if (idx >= 0 && parts[idx + 1]) return parts[idx + 1];
        var q = (window.location.search || '').slice(1).split('&').filter(Boolean);
        for (var i = 0; i < q.length; i++) {
          var kv = q[i].split('=');
          if (kv[0] === 'id') return decodeURIComponent(kv[1] || '');
        }
        return '';
      }

      function getAuth() {
        var key = (keyInput && keyInput.value) ? keyInput.value.trim() : '';
        return key ? { 'Authorization': 'Bearer ' + key } : {};
      }

      function setError(msg) {
        errorEl.textContent = msg || '';
      }

      function loadRequest() {
        var id = getRequestId();
        if (!id) return Promise.reject(new Error('No request ID in URL'));
        return fetch(API_BASE + '/records-requests/' + encodeURIComponent(id), {
          headers: getAuth(),
          credentials: 'include',
        }).then(function (r) {
          if (!r.ok) return r.json().then(function (d) { throw new Error(d.error || r.statusText); });
          return r.json();
        }).then(function (data) { return data.item; });
      }

      function renderInfo(item, caseRow) {
        var html = '<dl>';
        html += '<dt>Provider</dt><dd>' + (item.providerName || '—') + '</dd>';
        html += '<dt>Status</dt><dd>' + (item.status || '—') + '</dd>';
        if (caseRow) {
          html += '<dt>Case</dt><dd>' + (caseRow.caseNumber || caseRow.title || caseRow.id) + '</dd>';
          if (caseRow.clientName) html += '<dt>Client</dt><dd>' + caseRow.clientName + '</dd>';
        }
        if (item.dateFrom || item.dateTo) {
          var from = item.dateFrom ? new Date(item.dateFrom).toLocaleDateString() : '';
          var to = item.dateTo ? new Date(item.dateTo).toLocaleDateString() : '';
          html += '<dt>Date range</dt><dd>' + (from && to ? from + ' – ' + to : from || to || '—') + '</dd>';
        }
        if (item.notes && item.notes.trim()) html += '<dt>Notes</dt><dd>' + item.notes + '</dd>';
        html += '</dl>';
        return html;
      }

      function updatePdfUi(docId) {
        if (docId) {
          pdfStatusEl.textContent = 'PDF generated.';
          viewPdfLink.href = API_BASE + '/documents/' + encodeURIComponent(docId) + '/download';
          viewPdfLink.style.display = 'inline';
        } else {
          pdfStatusEl.textContent = 'No PDF generated yet.';
          viewPdfLink.style.display = 'none';
          viewPdfLink.href = '#';
        }
      }

      function refreshAttempts() {
        var id = getRequestId();
        if (!id) return;
        fetch(API_BASE + '/records-requests/' + encodeURIComponent(id) + '/attempts', {
          headers: getAuth(),
          credentials: 'include',
        }).then(function (r) {
          if (!r.ok) return r.json().then(function (d) { throw new Error(d.error || r.statusText); });
          return r.json();
        }).then(function (data) {
          var items = (data.items || data) || [];
          if (!Array.isArray(items)) items = [];
          if (items.length === 0) {
            attemptsListEl.innerHTML = '<p class="loading">No attempts yet.</p>';
            return;
          }
          var html = '<table><thead><tr><th>Channel</th><th>Destination</th><th>Result</th><th>Date</th></tr></thead><tbody>';
          items.forEach(function (a) {
            var okClass = a.ok ? 'ok-yes' : 'ok-no';
            var okText = a.ok ? 'OK' : (a.error || 'Failed');
            var dateStr = a.createdAt ? new Date(a.createdAt).toLocaleString() : '—';
            html += '<tr><td>' + (a.channel || '—') + '</td><td>' + (a.destination || '—') + '</td><td class="' + okClass + '">' + okText + '</td><td>' + dateStr + '</td></tr>';
          });
          html += '</tbody></table>';
          attemptsListEl.innerHTML = html;
        }).catch(function () {
          attemptsListEl.innerHTML = '<p class="loading">Could not load attempts.</p>';
        });
      }

      loadBtn.addEventListener('click', function () {
        setError('');
        loadingState.style.display = 'block';
        contentEl.style.display = 'none';
        var id = getRequestId();
        fetch(API_BASE + '/records-requests/' + encodeURIComponent(id), {
          headers: getAuth(),
          credentials: 'include',
        }).then(function (r) {
          if (!r.ok) return r.json().then(function (d) { throw new Error(d.error || r.statusText); });
          return r.json();
        }).then(function (data) {
          loadingState.style.display = 'none';
          contentEl.style.display = 'block';
          var item = data.item;
          pageTitleEl.textContent = 'Records Request – ' + (item.providerName || id);
          infoCardEl.innerHTML = renderInfo(item, data.case);
          updatePdfUi(item.generatedDocumentId);
          refreshAttempts();
          if (data.case && data.case.id) {
            backLink.href = '/cases/' + data.case.id;
            backLink.style.display = 'inline';
          }
        }).catch(function (e) {
          loadingState.style.display = 'block';
          contentEl.style.display = 'none';
          setError(e.message);
        });
      });

      regenerateBtn.addEventListener('click', function () {
        var id = getRequestId();
        if (!id) return;
        setError('');
        regenerateBtn.disabled = true;
        fetch(API_BASE + '/records-requests/' + encodeURIComponent(id) + '/generate-pdf', {
          method: 'POST',
          headers: getAuth(),
          credentials: 'include',
        }).then(function (r) {
          return r.json().then(function (data) {
            if (!r.ok) throw new Error(data.error || r.statusText);
            return data;
          });
        }).then(function (data) {
          updatePdfUi(data.documentId);
          if (data.documentId) {
            viewPdfLink.href = API_BASE + '/documents/' + encodeURIComponent(data.documentId) + '/download';
            viewPdfLink.target = '_blank';
          }
        }).catch(function (e) {
          setError(e.message);
        }).finally(function () {
          regenerateBtn.disabled = false;
        });
      });

      sendBtn.addEventListener('click', function () {
        sendDestination.value = '';
        sendModal.classList.add('open');
        sendModal.setAttribute('aria-hidden', 'false');
      });
      sendModalCancel.addEventListener('click', function () {
        sendModal.classList.remove('open');
        sendModal.setAttribute('aria-hidden', 'true');
      });
      sendModal.addEventListener('click', function (e) {
        if (e.target === sendModal) sendModalCancel.click();
      });
      sendModalSubmit.addEventListener('click', function () {
        var id = getRequestId();
        if (!id) return;
        var channel = sendChannel.value;
        var dest = sendDestination.value.trim();
        if (!dest) {
          setError('Enter email or fax number');
          return;
        }
        setError('');
        sendModalSubmit.disabled = true;
        fetch(API_BASE + '/records-requests/' + encodeURIComponent(id) + '/send', {
          method: 'POST',
          headers: Object.assign({}, getAuth(), { 'Content-Type': 'application/json' }),
          credentials: 'include',
          body: JSON.stringify({ channel: channel, destination: dest }),
        }).then(function (r) {
          return r.json().then(function (data) {
            if (!r.ok) throw new Error(data.error || r.statusText);
            return data;
          });
        }).then(function () {
          sendModal.classList.remove('open');
          sendModal.setAttribute('aria-hidden', 'true');
          refreshAttempts();
          fetch(API_BASE + '/records-requests/' + encodeURIComponent(id), { headers: getAuth(), credentials: 'include' })
            .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
            .then(function (data) {
              if (data.item && infoCardEl) infoCardEl.innerHTML = renderInfo(data.item, data.case);
            }).catch(function () {});
        }).catch(function (e) {
          setError(e.message);
        }).finally(function () {
          sendModalSubmit.disabled = false;
        });
      });

      try {
        var saved = sessionStorage.getItem('providerApiKey');
        if (saved && keyInput) keyInput.value = saved;
      } catch (e) {}
      if (getRequestId() && keyInput && keyInput.value.trim()) loadBtn.click();
    })();
  </script>
</body>
</html>
